spring.application.name=finance-sensei-api
spring.config.import=optional:file:.env[.properties]

# External API credentials (set real values here or via env vars)
exchangerate.api.key=${EXCHANGERATE_API_KEY:}
metals.api.key=${METALS_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
groq.api.key=${GROQ_API_KEY:}

# External API endpoints
exchangerate.api.base-url=https://v6.exchangerate-api.com/v6
metals.api.base-url=https://www.goldapi.io/api
quote.api.base-url=https://api.quotify.top
ai.ollama.default-url=${OLLAMA_BASE_URL:http://localhost:11434}
groq.api.model=${GROQ_MODEL:llama3-8b-8192}

# API client behavior
external.api.timeout-seconds=10

# Cache
cache.ttl.minutes=15
